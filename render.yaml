# Render Blueprint for the Lumora API (Go + Fiber + Postgres).
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
#
# This runs on Render's FREE tier, which has no persistent disk. Nothing is
# written to the filesystem: the database is external (Neon Postgres, set via
# DATABASE_URL) and profile photos are stored as rows in that database. The
# free instance also spins down after ~15 minutes idle, so the first request
# afterwards takes ~50s to wake.
services:
  - type: web
    name: lumora-api
    runtime: go
    plan: free
    region: frankfurt # closest region to East Africa
    rootDir: backend
    buildCommand: go build -o lumora .
    startCommand: ./lumora
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # PORT is injected by Render — config.Load() reads it, so don't set it.
      #
      # There is no Go version pin here on purpose: Render's native Go runtime
      # always builds with the latest stable Go and cannot be pinned (only a
      # Docker deploy can). go.mod requires >= 1.25.0, which latest stable
      # satisfies. GO_VERSION is not a supported setting — it would be ignored.

      # ---- Database ----
      # Neon Postgres connection string (Dashboard → paste by hand).
      # Deliberately NOT a Render Postgres: free Render databases are deleted
      # 30 days after creation. Must include ?sslmode=require.
      - key: DATABASE_URL
        sync: false

      # ---- Secrets ----
      # Generated once by Render and kept stable across deploys. Rotating it
      # invalidates every issued JWT, logging all users out.
      - key: JWT_SECRET
        generateValue: true

      # ---- URLs: the Netlify client URL. Exact origin, NO trailing slash. ----
      # CORS_ORIGINS gates browser API calls; APP_URL builds the links inside
      # password-reset emails and the Paystack callback.
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false

      # ---- Email (SMTP). Leave SMTP_HOST unset to disable email entirely. ----
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        value: Lumora

      # ---- Paystack. Empty secret = payments disabled, exams stay free. ----
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: EXAM_PRICE_KES
        value: "500"
      - key: KES_PER_USD
        value: "130"

      - key: HEART_REGEN_MINUTES
        value: "30"

      # ---- Message translation. Empty key = detection only, no translation. ----
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TRANSLATE_MODEL
        value: claude-opus-4-8
